<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Alan Partridge Soundboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- page header -->
<header>
  <h1>Alan Partridge Soundboard</h1>
</header>

<!-- main soundboard section -->
<main>

  <section class="grid">

    <!-- each button plays a sound -->
    <button class="sound" data-sound="audio1.mp3">ah-ha</button>
    <button class="sound" data-sound="audio2.mp3">back of the net</button>
    <button class="sound" data-sound="audio3.mp3">dan</button>
    <button class="sound" data-sound="audio4.mp3">bang out of order</button>
    <button class="sound" data-sound="audio5.mp3">email of the evening</button>
    <button class="sound" data-sound="audio6.mp3">hello partridge</button>
    <button class="sound" data-sound="audio7.mp3">i ate a scotch egg</button>
    <button class="sound" data-sound="audio8.mp3">i'm confused</button>
    <button class="sound" data-sound="audio9.mp3">jurassic park</button>

  </section>

</main>

<script src="index.js"></script>

</body>
</html>
