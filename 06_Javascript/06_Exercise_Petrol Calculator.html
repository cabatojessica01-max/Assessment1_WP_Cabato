<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petrol Calculator</title>
</head>

<body style="font-family:Arial; background:#eef2f7; margin:0; display:flex; justify-content:center; align-items:center; height:100vh;">

    <!-- main container -->
    <div style="background:#fff; padding:25px; width:300px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1);">

        <h1 style="text-align:center;">Petrol Calculator</h1>

        <!-- cost per liter -->
        <label style="display:block; margin-top:10px;">Cost per Liter (SAR):</label>
        <input type="number" id="price" value="1.72" step="0.01"
               style="width:100%; padding:7px; margin-top:4px; border:1px solid #ccc; border-radius:5px;">

        <!-- liters -->
        <label style="display:block; margin-top:10px;">Liters Purchased:</label>
        <input type="number" id="liters" value="0" step="0.01"
               style="width:100%; padding:7px; margin-top:4px; border:1px solid #ccc; border-radius:5px;">

        <!-- button -->
        <button onclick="calculateTotal()"
                style="width:100%; margin-top:15px; padding:9px; border:none; background:#4a90e2; color:white; border-radius:5px; cursor:pointer;">
            Calculate Total
        </button>

        <!-- result -->
        <p id="result" style="margin-top:12px; font-weight:bold;">
            Total Cost: SAR 0.00
        </p>

    </div>

    <!-- javascript -->
    <script>
        function calculateTotal() {

            let price = document.getElementById("price").value;
            let liters = document.getElementById("liters").value;

            price = parseFloat(price);
            liters = parseFloat(liters);

            let total = price * liters;

            document.getElementById("result").textContent =
                "Total Cost: SAR " + total.toFixed(2);
        }
    </script>

</body>
</html>
