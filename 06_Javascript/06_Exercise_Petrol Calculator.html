<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petrol Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="box">

    <h1>Petrol Calculator</h1>

    <label>cost per liter</label>
    <input type="number" id="price" value="1.72">

    <label>liters</label>
    <input type="number" id="liters" value="0">

    <button onclick="calculate()">calculate</button>

    <p id="result">total cost: sar 0.00</p>

</div>

<script>
function calculate() {
    let price = document.getElementById("price").value;
    let liters = document.getElementById("liters").value;

    let total = price * liters;

    document.getElementById("result").textContent =
        "total cost: sar " + total.toFixed(2);
}
</script>

</body>

</html>
