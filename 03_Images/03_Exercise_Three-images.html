<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>nature gallery</title>
    <link rel="stylesheet" href="style.css"> <!-- links external css file -->
</head>

<body>

<h1>nature theme gallery</h1>

<div class="gallery"> <!-- container holding all image cards -->

    <div class="card">
        <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470"
             alt="mountain landscape with sunset"
             title="mountain sunset"
             width="300" height="200"> <!-- sets image size in html -->
        <p>license: unsplash license (free for commercial use)</p> <!-- copyright info -->
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e"
             alt="forest pathway with trees"
             title="forest path"
             width="300" height="200">
        <p>license: unsplash license (free for commercial use)</p>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e"
             alt="ocean waves at sunset"
             title="ocean waves"
             width="300" height="200">
        <p>license: unsplash license (free for commercial use)</p>
    </div>

</div>

</body>
</html>
